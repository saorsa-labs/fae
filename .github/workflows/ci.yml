name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MACOSX_DEPLOYMENT_TARGET: '14.0'

jobs:
  build-and-test:
    name: Build & Test (macOS arm64)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: "Guard: no Rust reintroduction in active CI/default recipes"
        run: ./scripts/ci/guard-no-rust-reintro.sh

      - name: Resolve SPM dependencies
        run: xcodebuild -resolvePackageDependencies -scheme Fae -clonedSourcePackagesDirPath .build/spm-cache
        working-directory: native/macos/Fae

      - name: "Build (xcodebuild — compiles Metal shaders)"
        run: >
          xcodebuild build
          -scheme Fae
          -configuration Release
          -destination 'platform=macOS,arch=arm64'
          -derivedDataPath .build/xcode
          -clonedSourcePackagesDirPath .build/spm-cache
          -quiet
        working-directory: native/macos/Fae

      - name: Run tests
        run: swift test --package-path native/macos/Fae
