name: Release

on:
  push:
    tags:
      - "v*"

env:
  MACOSX_DEPLOYMENT_TARGET: '14.0'

permissions:
  contents: write

jobs:
  # ── Verify tag matches VERSION file ──────────────────────────────
  preflight:
    name: Pre-flight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches VERSION file
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match VERSION file ($FILE_VERSION)"
            exit 1
          fi
          echo "version=$FILE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$FILE_VERSION"

  # ── Run full test suite before building release artifacts ──────────
  test:
    name: Tests
    needs: preflight
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Clear stale SPM cache
        run: rm -rf ~/Library/Caches/org.swift.swiftpm/repositories

      - name: Run tests
        run: swift test --package-path native/macos/Fae

  # ── Build macOS app bundle (Apple Silicon) ────────────────────────
  build-macos:
    name: Build macOS (arm64)
    needs: test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Clear stale SPM cache
        run: rm -rf ~/Library/Caches/org.swift.swiftpm/repositories

      - name: Build Swift app (xcodebuild release — compiles Metal shaders)
        run: |
          pushd native/macos/Fae
          xcodebuild build \
            -scheme Fae \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath .build/xcode \
            -quiet

          PRODUCTS=".build/xcode/Build/Products/Release"
          SWIFT_BIN="$PRODUCTS/Fae"
          if [ ! -f "$SWIFT_BIN" ]; then
            echo "::error::Could not locate built Fae binary at $SWIFT_BIN"
            exit 1
          fi
          SWIFT_BIN_ABS="$(cd "$(dirname "$SWIFT_BIN")" && pwd)/$(basename "$SWIFT_BIN")"
          PRODUCTS_ABS="$(cd "$(dirname "$SWIFT_BIN")" && pwd)"
          echo "SWIFT_APP_BINARY=$SWIFT_BIN_ABS" >> "$GITHUB_ENV"
          echo "XCODE_PRODUCTS=$PRODUCTS_ABS" >> "$GITHUB_ENV"

          # Debug: show what's in the products directory
          echo "Products directory contents:"
          ls -la "$PRODUCTS_ABS/" || true
          echo "Searching for Sparkle.framework:"
          find .build/xcode -name "Sparkle.framework" -type d 2>/dev/null | head -5 || true
          popd

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ] || [ -z "$MACOS_CERTIFICATE_PASSWORD" ] || [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "::error::macOS signing secrets are required (MACOS_CERTIFICATE, MACOS_CERTIFICATE_PASSWORD, KEYCHAIN_PASSWORD)"
            exit 1
          fi

          echo "SIGNING_ENABLED=true" >> "$GITHUB_ENV"

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$MACOS_CERTIFICATE" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Sign binaries
        if: env.SIGNING_ENABLED == 'true'
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          if [ -z "$MACOS_SIGNING_IDENTITY" ]; then
            echo "::error::MACOS_SIGNING_IDENTITY is required for signed releases"
            exit 1
          fi

          codesign --force --options runtime \
            --sign "$MACOS_SIGNING_IDENTITY" \
            --entitlements Entitlements.plist \
            --timestamp \
            "$SWIFT_APP_BINARY"

      - name: Notarize binaries
        if: env.SIGNING_ENABLED == 'true'
        env:
          MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          MACOS_NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
        run: |
          if [ -z "$MACOS_NOTARIZATION_APPLE_ID" ] || [ -z "$MACOS_NOTARIZATION_PASSWORD" ] || [ -z "$MACOS_NOTARIZATION_TEAM_ID" ]; then
            echo "::error::macOS notarization secrets are required (MACOS_NOTARIZATION_APPLE_ID, MACOS_NOTARIZATION_PASSWORD, MACOS_NOTARIZATION_TEAM_ID)"
            exit 1
          fi

          NOTARIZE_ZIP="$RUNNER_TEMP/fae-native-swift-notarize.zip"
          ditto -c -k --keepParent "$SWIFT_APP_BINARY" "$NOTARIZE_ZIP"

          # Submit without --wait: Xcode 26 beta notarytool crashes with SIGBUS
          # during the long-running polling loop. Submit first, then poll separately
          # with short-lived notarytool info calls which don't trigger the crash.
          SUBMIT_JSON=$(xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$MACOS_NOTARIZATION_APPLE_ID" \
            --password "$MACOS_NOTARIZATION_PASSWORD" \
            --team-id "$MACOS_NOTARIZATION_TEAM_ID" \
            --output-format json 2>&1)
          echo "$SUBMIT_JSON"

          SUBMISSION_ID=$(echo "$SUBMIT_JSON" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || echo "")

          if [ -z "$SUBMISSION_ID" ]; then
            echo "::error::No submission ID returned from notarytool submit"
            exit 1
          fi
          echo "Submission ID: $SUBMISSION_ID"

          # Poll up to 15 minutes (30 x 30s) using short-lived notarytool info calls
          NOTARIZE_STATUS="In Progress"
          for attempt in $(seq 1 30); do
            sleep 30
            INFO_JSON=$(xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "$MACOS_NOTARIZATION_APPLE_ID" \
              --password "$MACOS_NOTARIZATION_PASSWORD" \
              --team-id "$MACOS_NOTARIZATION_TEAM_ID" \
              --output-format json 2>&1 || echo '{"status":"unknown"}')
            NOTARIZE_STATUS=$(echo "$INFO_JSON" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('status','In Progress'))" 2>/dev/null || echo "In Progress")
            echo "[$attempt/30] status: $NOTARIZE_STATUS"
            case "$NOTARIZE_STATUS" in
              Accepted) echo "Notarization accepted"; break ;;
              Invalid|Rejected)
                echo "::error::Notarization rejected"
                xcrun notarytool log "$SUBMISSION_ID" \
                  --apple-id "$MACOS_NOTARIZATION_APPLE_ID" \
                  --password "$MACOS_NOTARIZATION_PASSWORD" \
                  --team-id "$MACOS_NOTARIZATION_TEAM_ID" 2>&1 || true
                exit 1 ;;
            esac
          done

          if [ "$NOTARIZE_STATUS" != "Accepted" ]; then
            echo "::error::Notarization timed out (status: $NOTARIZE_STATUS)"
            exit 1
          fi

      - name: Prepare release payloads
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          DIST_DIR="$RUNNER_TEMP/fae-dist"
          APP_BUNDLE="$RUNNER_TEMP/Fae.app"
          ARCHIVE_STAGING="$RUNNER_TEMP/fae-archive-staging"
          ARCHIVE="$DIST_DIR/fae-${VERSION}-macos-arm64.tar.gz"
          UPDATE_ASSET="$DIST_DIR/fae-darwin-aarch64"

          rm -rf "$DIST_DIR" "$APP_BUNDLE" "$ARCHIVE_STAGING"
          mkdir -p "$DIST_DIR" "$ARCHIVE_STAGING"
          mkdir -p "$APP_BUNDLE/Contents/MacOS" "$APP_BUNDLE/Contents/Frameworks" "$APP_BUNDLE/Contents/Resources"

          # Standalone binary used by in-app self-update.
          cp "$SWIFT_APP_BINARY" "$UPDATE_ASSET"
          chmod +x "$UPDATE_ASSET"

          # Build native macOS app bundle (pure Swift + MLX).
          cp "$SWIFT_APP_BINARY" "$APP_BUNDLE/Contents/MacOS/Fae"
          cp assets/AppIcon.icns "$APP_BUNDLE/Contents/Resources/AppIcon.icns"
          chmod +x "$APP_BUNDLE/Contents/MacOS/Fae"

          # Copy all SPM resource bundles (Fae_Fae, mlx-swift_Cmlx, etc.)
          # Search both top-level and subdirectories for bundles
          BUNDLE_COUNT=0
          for search_dir in "$XCODE_PRODUCTS" "$XCODE_PRODUCTS/PackageFrameworks"; do
            for bundle_dir in "$search_dir"/*.bundle; do
              if [ -d "$bundle_dir" ]; then
                BNAME=$(basename "$bundle_dir")
                # Skip if already copied
                if [ ! -d "$APP_BUNDLE/Contents/Resources/$BNAME" ]; then
                  cp -R "$bundle_dir" "$APP_BUNDLE/Contents/Resources/"
                  echo "Copied $BNAME"
                  BUNDLE_COUNT=$((BUNDLE_COUNT+1))
                fi
              fi
            done
          done
          # If no bundles found at expected paths, search derived data
          if [ "$BUNDLE_COUNT" -eq 0 ]; then
            echo "No bundles at expected paths, searching derived data..."
            find "$(dirname "$XCODE_PRODUCTS")" -name "*.bundle" -maxdepth 3 -type d | while read bundle_dir; do
              BNAME=$(basename "$bundle_dir")
              if [ ! -d "$APP_BUNDLE/Contents/Resources/$BNAME" ]; then
                cp -R "$bundle_dir" "$APP_BUNDLE/Contents/Resources/"
                echo "Copied $BNAME (from search)"
              fi
            done
          fi

          # Embed Sparkle.framework — required at runtime, not statically linked.
          SPARKLE_FW="$XCODE_PRODUCTS/Sparkle.framework"
          if [ ! -d "$SPARKLE_FW" ]; then
            # Xcode 26+ may place frameworks in PackageFrameworks/
            SPARKLE_FW="$XCODE_PRODUCTS/PackageFrameworks/Sparkle.framework"
          fi
          if [ ! -d "$SPARKLE_FW" ]; then
            # Search the entire derived data tree as a last resort
            SPARKLE_FW="$(find "$(dirname "$XCODE_PRODUCTS")" -name "Sparkle.framework" -type d | head -1)"
          fi
          if [ ! -d "$SPARKLE_FW" ]; then
            echo "::error::Sparkle.framework not found anywhere in build products"
            echo "Searched: $XCODE_PRODUCTS and derived data"
            find "$(dirname "$XCODE_PRODUCTS")" -name "*.framework" -type d | head -20
            exit 1
          fi
          echo "Found Sparkle.framework at: $SPARKLE_FW"
          cp -R "$SPARKLE_FW" "$APP_BUNDLE/Contents/Frameworks/"

          # Ensure the binary finds Sparkle at @executable_path/../Frameworks.
          install_name_tool -add_rpath "@executable_path/../Frameworks" \
            "$APP_BUNDLE/Contents/MacOS/Fae" 2>/dev/null || true

          # Use checked-in Info.plist with version substitution.
          cp native/macos/Fae/Info.plist "$APP_BUNDLE/Contents/Info.plist"
          sed -i '' "s/__VERSION__/${VERSION}/g" "$APP_BUNDLE/Contents/Info.plist"
          APPCAST_URL="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/appcast.xml"
          sed -i '' "s|__APPCAST_URL__|${APPCAST_URL}|g" "$APP_BUNDLE/Contents/Info.plist"

          # Archive includes native app bundle.
          cp -R "$APP_BUNDLE" "$ARCHIVE_STAGING/Fae.app"
          cp README.md "$ARCHIVE_STAGING/"
          cp LICENSE "$ARCHIVE_STAGING/" 2>/dev/null || true
          tar -czf "$ARCHIVE" -C "$ARCHIVE_STAGING" .

          echo "DIST_DIR=$DIST_DIR" >> "$GITHUB_ENV"
          echo "APP_BUNDLE=$APP_BUNDLE" >> "$GITHUB_ENV"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          echo "UPDATE_ASSET=$UPDATE_ASSET" >> "$GITHUB_ENV"

      - name: Sign app bundle
        if: env.SIGNING_ENABLED == 'true'
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          # Sign inside-out: deepest nested bundles first, then binary, then top-level .app.
          # Apple notarization requires EVERY Mach-O in the bundle to be signed with
          # Developer ID + hardened runtime + secure timestamp.

          echo "=== Signing all Mach-O binaries inside Sparkle.framework ==="
          find "$APP_BUNDLE/Contents/Frameworks/Sparkle.framework" -type f | while read f; do
            if file "$f" | grep -q "Mach-O"; then
              echo "  Signing: $f"
              codesign --force --options runtime \
                --sign "$MACOS_SIGNING_IDENTITY" \
                --timestamp \
                "$f"
            fi
          done

          echo "=== Signing Sparkle XPC services ==="
          for xpc in "$APP_BUNDLE/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices"/*.xpc; do
            [ -d "$xpc" ] && codesign --force --options runtime \
              --sign "$MACOS_SIGNING_IDENTITY" \
              --timestamp \
              "$xpc"
          done

          echo "=== Signing Sparkle Updater.app ==="
          SPARKLE_UPDATER="$APP_BUNDLE/Contents/Frameworks/Sparkle.framework/Versions/B/Updater.app"
          [ -d "$SPARKLE_UPDATER" ] && codesign --force --options runtime \
            --sign "$MACOS_SIGNING_IDENTITY" \
            --timestamp \
            "$SPARKLE_UPDATER"

          echo "=== Signing Sparkle.framework ==="
          codesign --force --options runtime \
            --sign "$MACOS_SIGNING_IDENTITY" \
            --timestamp \
            "$APP_BUNDLE/Contents/Frameworks/Sparkle.framework"

          echo "=== Signing SPM resource bundles ==="
          for bundle in "$APP_BUNDLE/Contents/Resources"/*.bundle; do
            if [ -d "$bundle" ]; then
              # Sign any Mach-O files inside the resource bundle first
              find "$bundle" -type f | while read f; do
                if file "$f" | grep -q "Mach-O"; then
                  echo "  Signing: $f"
                  codesign --force --options runtime \
                    --sign "$MACOS_SIGNING_IDENTITY" \
                    --timestamp \
                    "$f"
                fi
              done
              echo "  Signing bundle: $bundle"
              codesign --force --options runtime \
                --sign "$MACOS_SIGNING_IDENTITY" \
                --timestamp \
                "$bundle"
            fi
          done

          echo "=== Signing main executable ==="
          codesign --force --options runtime \
            --sign "$MACOS_SIGNING_IDENTITY" \
            --entitlements Entitlements.plist \
            --timestamp \
            "$APP_BUNDLE/Contents/MacOS/Fae"

          echo "=== Signing standalone update binary ==="
          codesign --force --options runtime \
            --sign "$MACOS_SIGNING_IDENTITY" \
            --entitlements Entitlements.plist \
            --timestamp \
            "$UPDATE_ASSET"

          echo "=== Signing top-level .app bundle ==="
          codesign --force --options runtime \
            --sign "$MACOS_SIGNING_IDENTITY" \
            --entitlements Entitlements.plist \
            --timestamp \
            "$APP_BUNDLE"

          echo "=== Verifying signature ==="
          codesign --verify --deep --strict --verbose=2 "$APP_BUNDLE"
          # Note: spctl check skipped here — the app bundle is not yet notarized.
          # The DMG (which contains this bundle) gets notarized and stapled below.

      - name: Free disk space before DMG creation
        run: |
          # Remove notarization zip and build intermediates to reclaim space
          rm -f "$RUNNER_TEMP"/fae-*-notarize.zip
          rm -rf native/macos/Fae/.build/xcode/Build/Intermediates.noindex
          rm -rf native/macos/Fae/.build/xcode/Build/Products/Debug 2>/dev/null || true
          rm -rf native/macos/Fae/.build/xcode/SDKStatCaches.noindex 2>/dev/null || true
          echo "Disk usage after cleanup:"
          df -h "$RUNNER_TEMP" | tail -1

      - name: Build macOS installer (.dmg)
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          DMG_STAGING="$RUNNER_TEMP/fae-dmg-staging"
          INSTALLER_DMG="$DIST_DIR/fae-${VERSION}-macos-arm64.dmg"

          rm -rf "$DMG_STAGING" "$INSTALLER_DMG"
          mkdir -p "$DMG_STAGING"
          cp -R "$APP_BUNDLE" "$DMG_STAGING/Fae.app"
          ln -s /Applications "$DMG_STAGING/Applications"

          hdiutil create \
            -volname "Fae" \
            -srcfolder "$DMG_STAGING" \
            -ov \
            -format UDZO \
            "$INSTALLER_DMG"

          echo "INSTALLER_DMG=$INSTALLER_DMG" >> "$GITHUB_ENV"

      - name: Notarize installer (.dmg)
        if: env.SIGNING_ENABLED == 'true'
        env:
          MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          MACOS_NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
        run: |
          # Submit without --wait: Xcode 26 beta notarytool crashes with SIGBUS
          # during the long-running polling loop. Poll separately instead.
          SUBMIT_JSON=$(xcrun notarytool submit "$INSTALLER_DMG" \
            --apple-id "$MACOS_NOTARIZATION_APPLE_ID" \
            --password "$MACOS_NOTARIZATION_PASSWORD" \
            --team-id "$MACOS_NOTARIZATION_TEAM_ID" \
            --output-format json 2>&1)
          echo "$SUBMIT_JSON"

          SUBMISSION_ID=$(echo "$SUBMIT_JSON" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || echo "")

          if [ -z "$SUBMISSION_ID" ]; then
            echo "::error::No submission ID returned from notarytool submit"
            exit 1
          fi
          echo "Submission ID: $SUBMISSION_ID"

          # Poll up to 15 minutes using short-lived notarytool info calls
          NOTARIZE_STATUS="In Progress"
          for attempt in $(seq 1 30); do
            sleep 30
            INFO_JSON=$(xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "$MACOS_NOTARIZATION_APPLE_ID" \
              --password "$MACOS_NOTARIZATION_PASSWORD" \
              --team-id "$MACOS_NOTARIZATION_TEAM_ID" \
              --output-format json 2>&1 || echo '{"status":"unknown"}')
            NOTARIZE_STATUS=$(echo "$INFO_JSON" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('status','In Progress'))" 2>/dev/null || echo "In Progress")
            echo "[$attempt/30] status: $NOTARIZE_STATUS"
            case "$NOTARIZE_STATUS" in
              Accepted) echo "Notarization accepted!"; break ;;
              Invalid|Rejected)
                echo "::error::Notarization failed"
                xcrun notarytool log "$SUBMISSION_ID" \
                  --apple-id "$MACOS_NOTARIZATION_APPLE_ID" \
                  --password "$MACOS_NOTARIZATION_PASSWORD" \
                  --team-id "$MACOS_NOTARIZATION_TEAM_ID" 2>&1 || true
                exit 1 ;;
            esac
          done

          if [ "$NOTARIZE_STATUS" != "Accepted" ]; then
            echo "::error::Notarization timed out (status: $NOTARIZE_STATUS)"
            exit 1
          fi

          xcrun stapler staple "$INSTALLER_DMG"

      - name: Generate Sparkle EdDSA signature for DMG
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_KEY }}
        run: |
          if [ -z "$SPARKLE_KEY" ]; then
            echo "::warning::SPARKLE_KEY not set — skipping Sparkle signature"
            echo "SPARKLE_SIGNATURE=" >> "$GITHUB_ENV"
          else
            # Sparkle's sign_update is bundled in the SPM checkout.
            SIGN_UPDATE="$(find native/macos/Fae/.build -path '*/Sparkle/bin/sign_update' -type f 2>/dev/null | head -n 1)"
            if [ -z "$SIGN_UPDATE" ] || [ ! -x "$SIGN_UPDATE" ]; then
              # Fall back to downloading Sparkle CLI tools.
              curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz" \
                | tar xJ -C "$RUNNER_TEMP" bin/sign_update
              SIGN_UPDATE="$RUNNER_TEMP/bin/sign_update"
              chmod +x "$SIGN_UPDATE"
            fi

            DMG_SIZE=$(stat -f%z "$INSTALLER_DMG" 2>/dev/null || stat --format=%s "$INSTALLER_DMG")
            RAW_SIG=$("$SIGN_UPDATE" "$INSTALLER_DMG" --ed-key-file <(echo "$SPARKLE_KEY") 2>/dev/null || echo "")
            # sign_update outputs the full attribute string:
            #   sparkle:edSignature="BASE64==" sparkle:version="2"
            # or in older builds just the base64 value.
            # Extract only the base64 value so we can embed it cleanly in the XML template.
            SIGNATURE=$(echo "$RAW_SIG" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
            if [ -z "$SIGNATURE" ]; then
              # Fallback: assume raw output is already the bare base64 value.
              SIGNATURE="$RAW_SIG"
            fi
            echo "SPARKLE_SIGNATURE=$SIGNATURE" >> "$GITHUB_ENV"
            echo "DMG_SIZE=$DMG_SIZE" >> "$GITHUB_ENV"
            echo "Sparkle signature extracted (${#SIGNATURE} chars)"
          fi

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          python3 -c "
          import re, html, sys

          version = '$VERSION'
          try:
              with open('CHANGELOG.md', 'r') as f:
                  text = f.read()
          except FileNotFoundError:
              print(f'Version {version}', end='')
              sys.exit(0)

          # Extract section for this version (## [vX.Y.Z] until next ## [)
          pattern = rf'## \[v{re.escape(version)}\].*?\n(.*?)(?=\n## \[|$)'
          match = re.search(pattern, text, re.DOTALL)
          if not match:
              print(f'Version {version}', end='')
              sys.exit(0)

          body = match.group(1).strip()
          lines = body.split('\n')
          out = []
          in_list = False
          for line in lines:
              stripped = line.strip()
              if stripped.startswith('### '):
                  if in_list:
                      out.append('</ul>')
                      in_list = False
                  heading = html.escape(stripped[4:])
                  out.append(f'<h3>{heading}</h3>')
              elif stripped.startswith('- '):
                  if not in_list:
                      out.append('<ul>')
                      in_list = True
                  item = html.escape(stripped[2:])
                  # Bold markers
                  item = re.sub(r'\*\*(.+?)\*\*', r'<strong>\1</strong>', item)
                  # Inline code
                  item = re.sub(r'\x60(.+?)\x60', r'<code>\1</code>', item)
                  # mdash
                  item = item.replace(' — ', ' &mdash; ')
                  out.append(f'  <li>{item}</li>')
              elif stripped == '':
                  if in_list:
                      out.append('</ul>')
                      in_list = False
          if in_list:
              out.append('</ul>')

          print('\n'.join(out), end='')
          " > "$RUNNER_TEMP/release_notes.html"
          echo "Release notes extracted ($(wc -c < "$RUNNER_TEMP/release_notes.html") bytes)"

      - name: Stage release artifacts
        run: |
          ARTIFACTS_DIR="$RUNNER_TEMP/release-artifacts"
          rm -rf "$ARTIFACTS_DIR"
          mkdir -p "$ARTIFACTS_DIR"

          cp "$ARCHIVE" "$ARTIFACTS_DIR/"
          cp "$INSTALLER_DMG" "$ARTIFACTS_DIR/"
          cp "$UPDATE_ASSET" "$ARTIFACTS_DIR/"

          # Generate Sparkle appcast.xml if signature available.
          if [ -n "$SPARKLE_SIGNATURE" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            DMG_FILENAME="fae-${VERSION}-macos-arm64.dmg"
            REPO="${GITHUB_REPOSITORY}"
            DOWNLOAD_URL="https://github.com/${REPO}/releases/download/v${VERSION}/${DMG_FILENAME}"
            RELEASE_NOTES="$(cat "$RUNNER_TEMP/release_notes.html")"

            cat > "$ARTIFACTS_DIR/appcast.xml" << APPCAST_EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Fae Updates</title>
              <link>https://github.com/${REPO}/releases</link>
              <description>Fae automatic updates</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <pubDate>$(date -R)</pubDate>
                <description><![CDATA[${RELEASE_NOTES}]]></description>
                <enclosure
                  url="${DOWNLOAD_URL}"
                  sparkle:edSignature="${SPARKLE_SIGNATURE}"
                  length="${DMG_SIZE}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          APPCAST_EOF
            echo "Generated appcast.xml for v${VERSION}"
          fi

          echo "ARTIFACTS_DIR=$ARTIFACTS_DIR" >> "$GITHUB_ENV"

      - name: Validate appcast.xml
        if: env.SPARKLE_SIGNATURE != ''
        run: |
          APPCAST="$ARTIFACTS_DIR/appcast.xml"

          echo "=== appcast.xml contents ==="
          cat "$APPCAST"
          echo ""

          # 1. Well-formed XML — parse with Python's strict XML parser.
          python3 - "$APPCAST" << 'PYEOF'
          import sys, xml.etree.ElementTree as ET
          try:
              ET.parse(sys.argv[1])
              print("XML: well-formed")
          except ET.ParseError as e:
              print(f"::error::appcast.xml is not well-formed XML: {e}", file=sys.stderr)
              sys.exit(1)
          PYEOF

          # 2. Extract edSignature value via the XML parser (not grep) so we test what
          #    Sparkle will actually see.
          SIG=$(python3 - "$APPCAST" << 'PYEOF'
          import sys, xml.etree.ElementTree as ET
          NS = "http://www.andymatuschak.org/xml-namespaces/sparkle"
          tree = ET.parse(sys.argv[1])
          enc = tree.find(".//enclosure")
          if enc is None:
              print("", end="")
              sys.exit(0)
          print(enc.get(f"{{{NS}}}edSignature", ""), end="")
          PYEOF
          )

          echo "edSignature value: '$SIG'"

          # Must not be empty.
          if [ -z "$SIG" ]; then
            echo "::error::sparkle:edSignature is empty in appcast.xml"
            exit 1
          fi

          # Must not contain spaces — the sign_update output embedding bug produces
          # something like: sparkle:edSignature="BASE64==" sparkle:version="2"
          if echo "$SIG" | grep -q ' '; then
            echo "::error::sparkle:edSignature contains spaces — sign_update output was not parsed correctly. Raw value: $SIG"
            exit 1
          fi

          # Must be valid base64 (alphanumeric + / + = padding only).
          if ! echo "$SIG" | grep -qE '^[A-Za-z0-9+/]+=*$'; then
            echo "::error::sparkle:edSignature is not valid base64: $SIG"
            exit 1
          fi

          echo "appcast.xml validation passed — edSignature is ${#SIG} chars of valid base64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fae-macos-arm64
          path: ${{ env.ARTIFACTS_DIR }}/*

  # ── Create GitHub Release ─────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f ! -name 'SHA256SUMS.txt' -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Sign checksums with GPG
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ] || [ -z "$GPG_PASSPHRASE" ]; then
            echo "::error::GPG_PRIVATE_KEY and GPG_PASSPHRASE secrets are required for release signing"
            exit 1
          fi

          cd artifacts
          export GNUPGHOME="$RUNNER_TEMP/gnupg-release-signing"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"

          KEY_FILE="$RUNNER_TEMP/release-signing-key.asc"
          printf "%s" "$GPG_PRIVATE_KEY" > "$KEY_FILE"
          if ! gpg --batch --import "$KEY_FILE" >/dev/null 2>&1; then
            DECODED_KEY_FILE="$RUNNER_TEMP/release-signing-key.decoded.asc"
            if ! base64 --decode "$KEY_FILE" > "$DECODED_KEY_FILE" 2>/dev/null || ! gpg --batch --import "$DECODED_KEY_FILE"; then
              echo "::error::failed to import GPG_PRIVATE_KEY (expected armored key or base64-encoded armored key)"
              exit 1
            fi
          fi

          KEY_FPR="$(gpg --batch --with-colons --list-secret-keys | awk -F: '/^fpr:/ {print $10; exit}')"
          if [ -z "$KEY_FPR" ]; then
            echo "::error::could not determine signing key fingerprint"
            exit 1
          fi

          gpg --batch --yes \
            --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --local-user "$KEY_FPR" \
            --armor --detach-sign \
            --output SHA256SUMS.txt.asc \
            SHA256SUMS.txt

          gpg --batch --verify SHA256SUMS.txt.asc SHA256SUMS.txt
          gpg --batch --armor --export "$KEY_FPR" > FAE_UPDATE_SIGNING_KEY.asc

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.dmg
            artifacts/**/fae-darwin-aarch64
            artifacts/**/appcast.xml
            artifacts/SHA256SUMS.txt
            artifacts/SHA256SUMS.txt.asc
            artifacts/FAE_UPDATE_SIGNING_KEY.asc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
