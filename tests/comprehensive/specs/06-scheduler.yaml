phase: "06-scheduler"
name: "Scheduler"
description: "Validates scheduler CRUD operations and task triggering"
tests:
  - id: "sched-001"
    name: "List scheduled tasks"
    class: deterministic
    timeout_s: 200
    setup:
      - action: "http_post"
        url: "/config"
        body: {"key": "tool_mode", "value": "full_no_approval"}
      - action: "http_post"
        url: "/reset"
    teardown: []
    phrasings:
      - "Fae, use the scheduler_list tool to show all scheduled tasks"
      - "Fae, call scheduler_list to show me all my scheduled tasks"
    steps:
      - action: "inject"
        phrasing: "random"
      - action: "wait_generation"
        max_wait_s: 180
      - action: "collect_events"
    criteria:
      - name: "tool_invoked"
        check: "events_contain_kind('Tool', 'scheduler_list')"
      - name: "shows_builtin_tasks"
        check: "assistant_response_contains_any(['memory', 'backup', 'morning', 'task', 'check', 'skill', 'vault', 'scheduled', 'briefing', 'reindex', 'update'])"
    pass_threshold: 1.0

  - id: "sched-002"
    name: "Create interval task"
    class: deterministic
    timeout_s: 200
    setup:
      - action: "http_post"
        url: "/reset"
    teardown: []
    phrasings:
      - "Fae, use the scheduler_create tool to create a task called fae-sched-test that runs every 5 minutes"
      - "Fae, call scheduler_create to add a new task named fae-sched-test with a 5-minute interval"
    steps:
      - action: "inject"
        phrasing: "random"
      - action: "wait_generation"
        max_wait_s: 180
      - action: "collect_events"
    criteria:
      - name: "tool_invoked"
        check: "events_contain_kind('Tool', 'scheduler_create')"
      - name: "response_confirms"
        check: "assistant_response_contains_any(['created', 'fae-sched-test', 'scheduled', 'done', 'set', 'interval', 'minute', '5'])"
    pass_threshold: 1.0

  - id: "sched-003"
    name: "Create daily task"
    class: deterministic
    timeout_s: 200
    setup:
      - action: "http_post"
        url: "/reset"
    teardown: []
    phrasings:
      - "Fae, use the scheduler_create tool to add a daily task called fae-daily-test at 14:00"
      - "Fae, create a scheduled daily task named fae-daily-test that runs every day at 2pm"
    steps:
      - action: "inject"
        phrasing: "random"
      - action: "wait_generation"
        max_wait_s: 180
      - action: "collect_events"
    criteria:
      - name: "tool_invoked"
        check: "events_contain_kind('Tool', 'scheduler_create')"
      - name: "response_confirms"
        check: "assistant_response_contains_any(['created', 'fae-daily-test', 'daily', '14:00', '2'])"
    pass_threshold: 1.0

  - id: "sched-004"
    name: "Update task schedule"
    class: deterministic
    timeout_s: 200
    depends_on: ["sched-002"]
    setup:
      - action: "http_post"
        url: "/reset"
    teardown: []
    phrasings:
      - "Fae, use the scheduler_update tool to change fae-sched-test to run every 10 minutes"
      - "Fae, update the schedule for fae-sched-test to every 10 minutes using scheduler_update"
    steps:
      - action: "inject"
        phrasing: "random"
      - action: "wait_generation"
        max_wait_s: 180
      - action: "collect_events"
    criteria:
      - name: "tool_invoked"
        check: "events_contain_kind('Tool', 'scheduler_update')"
      - name: "response_confirms"
        check: "assistant_response_contains_any(['updated', 'fae-sched-test', '10'])"
    pass_threshold: 1.0

  - id: "sched-005"
    name: "Trigger task immediately"
    class: deterministic
    timeout_s: 200
    depends_on: ["sched-002"]
    setup:
      - action: "http_post"
        url: "/reset"
    teardown: []
    phrasings:
      - "Fae, use the scheduler_trigger tool to run fae-sched-test now"
      - "Fae, trigger fae-sched-test immediately using the scheduler"
    steps:
      - action: "inject"
        phrasing: "random"
      - action: "wait_generation"
        max_wait_s: 180
      - action: "collect_events"
    criteria:
      - name: "tool_invoked"
        check: "events_contain_kind('Tool', 'scheduler_trigger')"
    pass_threshold: 1.0

  - id: "sched-006"
    name: "Delete interval task"
    class: deterministic
    timeout_s: 200
    depends_on: ["sched-002"]
    setup:
      - action: "http_post"
        url: "/reset"
    teardown: []
    phrasings:
      - "Fae, use the scheduler_delete tool to remove fae-sched-test"
      - "Fae, delete fae-sched-test from the scheduler using scheduler_delete"
    steps:
      - action: "inject"
        phrasing: "random"
      - action: "wait_generation"
        max_wait_s: 180
      - action: "collect_events"
    criteria:
      - name: "tool_invoked"
        check: "events_contain_kind('Tool', 'scheduler_delete')"
      - name: "response_confirms"
        check: "assistant_response_contains_any(['deleted', 'removed', 'fae-sched-test'])"
    pass_threshold: 1.0

  - id: "sched-007"
    name: "Delete daily task"
    class: deterministic
    timeout_s: 200
    depends_on: ["sched-003"]
    setup:
      - action: "http_post"
        url: "/reset"
    teardown: []
    phrasings:
      - "Fae, use the scheduler_delete tool to remove fae-daily-test"
      - "Fae, delete fae-daily-test from the scheduler using scheduler_delete"
    steps:
      - action: "inject"
        phrasing: "random"
      - action: "wait_generation"
        max_wait_s: 180
      - action: "collect_events"
    criteria:
      - name: "tool_invoked"
        check: "events_contain_kind('Tool', 'scheduler_delete')"
      - name: "response_confirms"
        check: "assistant_response_contains_any(['deleted', 'removed', 'fae-daily-test'])"
    pass_threshold: 1.0
