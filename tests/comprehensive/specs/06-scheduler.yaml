phase: "06-scheduler"
name: "Scheduler"
description: "Validates scheduler CRUD operations and task triggering"
tests:
  - id: "sched-001"
    name: "List scheduled tasks"
    class: deterministic
    timeout_s: 200
    setup:
      - action: "http_post"
        url: "/config"
        body: {"key": "tool_mode", "value": "full_no_approval"}
      - action: "http_post"
        url: "/reset"
    teardown: []
    phrasings:
      - "Fae, list all scheduled tasks"
      - "Fae, show me the scheduler"
      - "Fae, what tasks are scheduled?"
    steps:
      - action: "inject"
        phrasing: "random"
      - action: "wait_generation"
        max_wait_s: 180
      - action: "collect_events"
    criteria:
      - name: "tool_invoked"
        check: "events_contain_kind('Tool', 'scheduler_list')"
      - name: "shows_builtin_tasks"
        check: "assistant_response_contains_any(['memory', 'backup', 'morning'])"
    pass_threshold: 1.0

  - id: "sched-002"
    name: "Create interval task"
    class: deterministic
    timeout_s: 200
    setup:
      - action: "http_post"
        url: "/reset"
    teardown: []
    phrasings:
      - "Fae, schedule a task called fae-sched-test that runs every 5 minutes"
      - "Fae, create a scheduled task named fae-sched-test with a 5-minute interval"
    steps:
      - action: "inject"
        phrasing: "random"
      - action: "wait_generation"
        max_wait_s: 180
      - action: "collect_events"
    criteria:
      - name: "tool_invoked"
        check: "events_contain_kind('Tool', 'scheduler_create')"
      - name: "response_confirms"
        check: "assistant_response_contains_any(['created', 'fae-sched-test', 'scheduled'])"
    pass_threshold: 1.0

  - id: "sched-003"
    name: "Create daily task"
    class: deterministic
    timeout_s: 200
    setup:
      - action: "http_post"
        url: "/reset"
    teardown: []
    phrasings:
      - "Fae, schedule a daily task at 14:00 called fae-daily-test"
      - "Fae, create a task named fae-daily-test that runs every day at 2pm"
    steps:
      - action: "inject"
        phrasing: "random"
      - action: "wait_generation"
        max_wait_s: 180
      - action: "collect_events"
    criteria:
      - name: "tool_invoked"
        check: "events_contain_kind('Tool', 'scheduler_create')"
      - name: "response_confirms"
        check: "assistant_response_contains_any(['created', 'fae-daily-test', 'daily', '14:00', '2'])"
    pass_threshold: 1.0

  - id: "sched-004"
    name: "Update task schedule"
    class: deterministic
    timeout_s: 200
    depends_on: ["sched-002"]
    setup:
      - action: "http_post"
        url: "/reset"
    teardown: []
    phrasings:
      - "Fae, change fae-sched-test to run every 10 minutes"
      - "Fae, update the fae-sched-test schedule to every 10 minutes"
    steps:
      - action: "inject"
        phrasing: "random"
      - action: "wait_generation"
        max_wait_s: 180
      - action: "collect_events"
    criteria:
      - name: "tool_invoked"
        check: "events_contain_kind('Tool', 'scheduler_update')"
      - name: "response_confirms"
        check: "assistant_response_contains_any(['updated', 'fae-sched-test', '10'])"
    pass_threshold: 1.0

  - id: "sched-005"
    name: "Trigger task immediately"
    class: deterministic
    timeout_s: 200
    depends_on: ["sched-002"]
    setup:
      - action: "http_post"
        url: "/reset"
    teardown: []
    phrasings:
      - "Fae, trigger fae-sched-test now"
      - "Fae, run fae-sched-test immediately"
    steps:
      - action: "inject"
        phrasing: "random"
      - action: "wait_generation"
        max_wait_s: 180
      - action: "collect_events"
    criteria:
      - name: "tool_invoked"
        check: "events_contain_kind('Tool', 'scheduler_trigger')"
    pass_threshold: 1.0

  - id: "sched-006"
    name: "Delete interval task"
    class: deterministic
    timeout_s: 200
    depends_on: ["sched-002"]
    setup:
      - action: "http_post"
        url: "/reset"
    teardown: []
    phrasings:
      - "Fae, delete fae-sched-test"
      - "Fae, remove the fae-sched-test task"
    steps:
      - action: "inject"
        phrasing: "random"
      - action: "wait_generation"
        max_wait_s: 180
      - action: "collect_events"
    criteria:
      - name: "tool_invoked"
        check: "events_contain_kind('Tool', 'scheduler_delete')"
      - name: "response_confirms"
        check: "assistant_response_contains_any(['deleted', 'removed', 'fae-sched-test'])"
    pass_threshold: 1.0

  - id: "sched-007"
    name: "Delete daily task"
    class: deterministic
    timeout_s: 200
    depends_on: ["sched-003"]
    setup:
      - action: "http_post"
        url: "/reset"
    teardown: []
    phrasings:
      - "Fae, delete fae-daily-test"
      - "Fae, remove the fae-daily-test task"
    steps:
      - action: "inject"
        phrasing: "random"
      - action: "wait_generation"
        max_wait_s: 180
      - action: "collect_events"
    criteria:
      - name: "tool_invoked"
        check: "events_contain_kind('Tool', 'scheduler_delete')"
      - name: "response_confirms"
        check: "assistant_response_contains_any(['deleted', 'removed', 'fae-daily-test'])"
    pass_threshold: 1.0
