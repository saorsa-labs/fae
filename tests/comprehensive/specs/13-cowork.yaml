phase: "13-cowork"
name: "CoWork Pipeline"
description: "Validates single-model runtime fields in /status and basic CoWork behavior"
tests:
  - id: "cowork-001"
    name: "/status exposes local model runtime fields"
    class: deterministic
    timeout_s: 10
    setup: []
    teardown: []
    phrasings: []
    steps:
      - action: "http_get"
        url: "/status"
    criteria:
      - name: "has_operatorLoaded"
        check: "body.operatorLoaded != null"
      - name: "has_pipeline"
        check: "body.pipeline == 'running'"
      - name: "has_modelLabel"
        check: "body.modelLabel != null"
    pass_threshold: 1.0

  - id: "cowork-002"
    name: "Model is loaded and running"
    class: deterministic
    timeout_s: 15
    setup: []
    teardown: []
    phrasings: []
    steps:
      - action: "http_get"
        url: "/status"
    criteria:
      - name: "operator_is_loaded"
        check: "body.operatorLoaded == true"
    pass_threshold: 1.0

  - id: "cowork-003"
    name: "Rich prompt produces a response"
    class: deterministic
    timeout_s: 60
    setup:
      - action: "http_post"
        url: "/config"
        body: {"key": "tool_mode", "value": "off"}
      - action: "http_post"
        url: "/reset"
    teardown: []
    phrasings: []
    steps:
      - action: "inject"
        text: "Fae, can you summarize the key principles of good software design?"
      - action: "wait_generation"
        max_wait_s: 60
    criteria:
      - name: "response_generated"
        check: "assistant_response_length > 0"
    pass_threshold: 1.0

  - id: "cowork-004"
    name: "Tool-biased prompt produces a response"
    class: deterministic
    timeout_s: 60
    setup:
      - action: "http_post"
        url: "/config"
        body: {"key": "tool_mode", "value": "off"}
      - action: "http_post"
        url: "/reset"
    teardown: []
    phrasings: []
    steps:
      - action: "inject"
        text: "Fae, tell me about the latest news in machine learning"
      - action: "wait_generation"
        max_wait_s: 60
    criteria:
      - name: "response_generated"
        check: "assistant_response_length > 0"
    pass_threshold: 1.0

  - id: "cowork-005"
    name: "Two-turn context retention"
    class: llm_scored
    timeout_s: 180
    setup:
      - action: "http_post"
        url: "/config"
        body: {"key": "tool_mode", "value": "off"}
      - action: "http_post"
        url: "/reset"
    teardown: []
    phrasings: []
    steps:
      - action: "inject"
        text: "Fae, my project is called Nebula and it uses TypeScript"
      - action: "wait_generation"
        max_wait_s: 120
      - action: "inject"
        text: "Fae, what language does my project use?"
      - action: "wait_generation"
        max_wait_s: 120
      - action: "collect_events"
    criteria:
      - name: "response_generated"
        check: "assistant_response_length > 0"
      - name: "recalls_language"
        check: "assistant_response_contains_any(['TypeScript', 'typescript'])"
    pass_threshold: 1.0
