phase: "02-core-tools"
name: "Core Tools"
description: "Validates all 32 tools can be invoked via natural language injection"
tests:
  # --- 1. read ---
  - id: "tool-001"
    name: "read tool invocation"
    class: deterministic
    timeout_s: 200
    setup:
      - action: "http_post"
        url: "/config"
        body: {"key": "tool_mode", "value": "full_no_approval"}
      - action: "http_post"
        url: "/reset"
    teardown: []
    phrasings:
      # Explicit tool reference prevents LLM from responding from memory cache
      - "Fae, use the read tool to get /etc/hosts right now"
      - "Fae, call the read tool to read the file /etc/hosts"
    steps:
      - action: "inject"
        phrasing: "random"
      - action: "wait_generation"
        max_wait_s: 180
      - action: "collect_events"
    criteria:
      - name: "tool_invoked"
        check: "events_contain_kind('Tool', 'read')"
      - name: "response_mentions_localhost"
        check: "assistant_response_contains('127.0.0.1')"
    # tool_invoked alone is sufficient — Fae may summarise rather than quote verbatim
    pass_threshold: 0.5

  # --- 2. write ---
  - id: "tool-002"
    name: "write tool invocation"
    class: deterministic
    timeout_s: 200
    setup:
      - action: "http_post"
        url: "/reset"
    teardown:
      - action: "bash"
        command: "rm -f /tmp/fae-test-write.txt"
    phrasings:
      - "Fae, write 'hello fae test' to /tmp/fae-test-write.txt"
      - "Fae, create a file at /tmp/fae-test-write.txt with the text 'hello fae test'"
      - "Fae, save the text 'hello fae test' to /tmp/fae-test-write.txt"
    steps:
      - action: "inject"
        phrasing: "random"
      - action: "wait_generation"
        max_wait_s: 180
      - action: "collect_events"
    criteria:
      - name: "tool_invoked"
        check: "events_contain_kind('Tool', 'write')"
      - name: "file_exists"
        check: "file_exists('/tmp/fae-test-write.txt')"
    pass_threshold: 1.0

  # --- 3. edit ---
  - id: "tool-003"
    name: "edit tool invocation"
    class: deterministic
    timeout_s: 200
    setup:
      - action: "http_post"
        url: "/config"
        body: {"key": "tool_mode", "value": "full_no_approval"}
      - action: "bash"
        command: "printf 'FAETEST_ORIGINAL' > /tmp/fae-test-edit.txt"
      - action: "http_post"
        url: "/reset"
    teardown:
      - action: "bash"
        command: "rm -f /tmp/fae-test-edit.txt"
    phrasings:
      - "Fae, edit /tmp/fae-test-edit.txt and replace FAETEST_ORIGINAL with FAETEST_MODIFIED"
      - "Fae, in the file /tmp/fae-test-edit.txt change FAETEST_ORIGINAL to FAETEST_MODIFIED"
    steps:
      - action: "inject"
        phrasing: "random"
      - action: "wait_generation"
        max_wait_s: 180
      - action: "collect_events"
    criteria:
      - name: "tool_invoked"
        check: "events_contain_kind('Tool', 'edit')"
      - name: "file_modified"
        check: "file_contains('/tmp/fae-test-edit.txt', 'FAETEST_MODIFIED')"
    pass_threshold: 1.0

