        check: "events_contain_any_kind(['VoiceCmd', 'voice_command']) or events_contain_any(['barge', 'enabled'])"
    pass_threshold: 1.0

  - id: "vc-010"
    name: "Disable barge-in via voice"
    class: deterministic
    timeout_s: 60
    setup:
      - action: "http_post"
        url: "/config"
        body: {"key": "barge_in.enabled", "value": "true"}
      - action: "http_post"
        url: "/reset"
    teardown:
      - action: "http_post"
        url: "/config"
        body: {"key": "barge_in.enabled", "value": "true"}
    phrasings:
      - "Fae, disable barge in"
      - "Fae, turn off barge in"
      - "Fae, don't let me interrupt"
    steps:
      - action: "inject"
        phrasing: "random"
      - action: "sleep"
        duration_ms: 3000
      - action: "collect_events"
    criteria:
      - name: "command_handled"
        check: "events_contain_any_kind(['VoiceCmd', 'voice_command']) or events_contain_any(['barge', 'disabled'])"
    pass_threshold: 1.0
