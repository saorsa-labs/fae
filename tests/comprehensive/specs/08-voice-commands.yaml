    teardown:
      - action: "http_post"
        url: "/config"
        body: {"key": "barge_in.enabled", "value": "true"}
    phrasings:
      - "Fae, enable barge in"
      - "Fae, turn on barge in"
      - "Fae, let me interrupt you"
    steps:
      - action: "inject"
